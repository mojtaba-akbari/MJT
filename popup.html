<!DOCTYPE html>
<!-- Mojjjak: popup UI for MJT Translator -->
<!-- Authors: mojtaba.akbari@gwdg.de, matthias.eulert@gwdg.de -->
<html>
<head>
<style>
  body { width: 320px; padding: 14px; font-family: system-ui; font-size: 13px; margin: 0; }
  select, input { width: 100%; padding: 6px; margin: 4px 0 10px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; }
  label { font-weight: 600; display: block; }
  button { width: 100%; padding: 10px; border: none; border-radius: 6px; font-size: 14px; font-weight: 700; cursor: pointer; color: #fff; }
  .start { background: #2563eb; }
  .stop { background: #dc2626; }
  .status { text-align: center; margin-top: 8px; color: #666; font-size: 12px; }
  a { color: #2563eb; font-size: 11px; }
  .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .header-left { display: flex; align-items: center; }
  .header-left h2 { margin: 0; font-size: 15px; }
  .icon-btn { background: none; border: 1px solid #ddd; border-radius: 6px; width: auto; padding: 4px 10px; font-size: 16px; cursor: pointer; color: #555; }
  .icon-btn:hover { background: #f0f0f0; }
  .project-btn { padding: 2px 4px; display: flex; align-items: center; justify-content: center; }
  .project-btn img { width: 22px; height: 22px; border-radius: 4px; animation: iconPulse 2s ease-in-out 3; }
  @keyframes iconPulse {
    0%, 100% { transform: scale(1); opacity: 1; }
    50% { transform: scale(1.15); opacity: 0.7; }
  }
  .settings { display: none; border-top: 1px solid #eee; padding-top: 10px; margin-top: 10px; }
  .settings.open { display: block; }
  .settings-title { font-weight: 700; font-size: 13px; margin-bottom: 8px; color: #333; }
  .toggle-row { display: flex; justify-content: space-between; align-items: center; margin: 6px 0; }
  .toggle-row span { font-size: 12px; }
  .toggle { position: relative; width: 40px; height: 22px; flex-shrink: 0; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .slider { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: #ccc; border-radius: 22px; cursor: pointer; transition: 0.3s; }
  .slider:before { content: ""; position: absolute; height: 16px; width: 16px; left: 3px; bottom: 3px; background: #fff; border-radius: 50%; transition: 0.3s; }
  .toggle input:checked + .slider { background: #2563eb; }
  .toggle input:checked + .slider:before { transform: translateX(18px); }
  .size-row { display: flex; align-items: center; gap: 8px; margin: 6px 0; }
  .size-row span { font-size: 12px; white-space: nowrap; }
  .size-row input[type=range] { flex: 1; margin: 0; padding: 0; }

  /* Mojjjak: log panel */
  .log-panel { display: none; border-top: 1px solid #eee; padding-top: 10px; margin-top: 10px; }
  .log-panel.open { display: block; }
  .log-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
  .log-header span { font-weight: 700; font-size: 13px; color: #333; }
  .log-actions { display: flex; gap: 6px; }
  .log-actions button { width: auto; padding: 4px 10px; font-size: 11px; border-radius: 4px; }
  .export-btn { background: #16a34a; }
  .clear-btn { background: #888; }
  .log-list { max-height: 250px; overflow-y: auto; font-size: 12px; border: 1px solid #eee; border-radius: 6px; padding: 6px; }
  .log-entry { padding: 4px 0; border-bottom: 1px solid #f0f0f0; }
  .log-entry:last-child { border-bottom: none; }
  .log-time { color: #2563eb; font-weight: 600; font-size: 11px; margin-right: 6px; }
  .log-empty { color: #aaa; text-align: center; padding: 20px 0; }

  .about-panel { display: none; border-top: 1px solid #eee; padding-top: 10px; margin-top: 10px; text-align: center; }
  .about-panel.open { display: block; }
  .about-panel h3 { margin: 0 0 6px; font-size: 14px; }
  .about-panel p { margin: 4px 0; font-size: 11px; color: #666; }
  .about-panel a { color: #2563eb; }

  .key-btn { display: inline-block; margin-top: 6px; padding: 6px 14px; background: #16a34a; color: #fff; font-size: 12px; font-weight: 600; border-radius: 6px; text-decoration: none; border: none; cursor: pointer; }
  .key-btn:hover { background: #15803d; }
</style>
</head>
<body>

  <div class="header">
    <div class="header-left">
      <h2>MJT Translator</h2>
    </div>
    <div class="header-btns" style="display:flex;gap:6px">
      <button class="icon-btn" id="aboutBtn" title="About">&#9432;</button>
      <button class="icon-btn" id="logBtn" title="Subtitle Log">&#128220;</button>
      <button class="icon-btn" id="gearBtn" title="Settings">&#9881;</button>
      <a href="https://www.google.com" target="_blank" title="GitHub Project" class="icon-btn project-btn"><img src="icon128.png" alt="MJT"></a>
    </div>
  </div>

  <label>Audio Language (what you hear)</label>
  <select id="sourceLang">
    <option value="de-DE" data-short="de">German</option>
    <option value="en-US" data-short="en">English</option>
    <option value="fr-FR" data-short="fr">French</option>
    <option value="es-ES" data-short="es">Spanish</option>
    <option value="ja-JP" data-short="ja">Japanese</option>
    <option value="zh-CN" data-short="zh">Chinese</option>
    <option value="ru-RU" data-short="ru">Russian</option>
    <option value="pt-BR" data-short="pt">Portuguese</option>
    <option value="it-IT" data-short="it">Italian</option>
  </select>

  <label>Translate To</label>
  <select id="targetLang">
    <option value="en">English</option>
    <option value="de">German</option>
    <option value="fr">French</option>
    <option value="es">Spanish</option>
    <option value="ja">Japanese</option>
    <option value="zh">Chinese</option>
    <option value="ru">Russian</option>
    <option value="pt">Portuguese</option>
    <option value="it">Italian</option>
  </select>

  <br>
  <button id="btn" class="start">Start Subtitles</button>
  <div class="status" id="status"></div>

  <!-- Mojjjak: log panel -->
  <div class="log-panel" id="logPanel">
    <div class="log-header">
      <span>Subtitle Log</span>
      <div class="log-actions">
        <button class="export-btn" id="exportBtn">Export .txt</button>
        <button class="clear-btn" id="clearBtn">Clear</button>
      </div>
    </div>
    <div class="log-list" id="logList">
      <div class="log-empty">No subtitles yet</div>
    </div>
  </div>

  <!-- Mojjjak: settings panel -->
  <div class="settings" id="settingsPanel">
    <div class="settings-title">Settings</div>

    <label>API Provider</label>
    <select id="apiProvider">
      <option value="groq">Groq (free)</option>
      <option value="openai">OpenAI</option>
      <option value="custom">Custom endpoint</option>
    </select>

    <label>API Key</label>
    <input id="groqKey" type="password" placeholder="gsk_...">
    <div id="apiHint"><a href="https://console.groq.com/keys" target="_blank" class="key-btn">Get free API key</a></div>

    <!-- Mojjjak: custom endpoint fields, shown only when "Custom" is selected -->
    <div id="customFields" style="display:none">
      <label>STT Endpoint</label>
      <input id="customSttUrl" type="text" placeholder="https://your-server/v1/audio/transcriptions">
      <label>LLM Endpoint</label>
      <input id="customLlmUrl" type="text" placeholder="https://your-server/v1/chat/completions">
      <label>STT Model</label>
      <input id="customSttModel" type="text" placeholder="whisper-large-v3">
      <label>LLM Model</label>
      <input id="customLlmModel" type="text" placeholder="llama-3.3-70b-versatile">
    </div>
    <br>

    <label>Subtitle Position</label>
    <select id="subtitlePos">
      <option value="bottom">Bottom</option>
      <option value="top">Top</option>
      <option value="center">Center</option>
    </select>

    <div class="toggle-row">
      <span>High contrast mode</span>
      <label class="toggle">
        <input type="checkbox" id="highContrast">
        <span class="slider"></span>
      </label>
    </div>

    <div class="size-row">
      <span>Font size</span>
      <input type="range" id="fontSize" min="18" max="40" value="24">
      <span id="fontSizeVal">24px</span>
    </div>
  </div>

  <!-- Mojjjak: about panel -->
  <div class="about-panel" id="aboutPanel">
    <h3>MJT - Mojjjak Translator</h3>
    <p>Version 1.0</p>
    <p>Mojtaba Akbari &amp; Matthias Eulert</p>
    <p>@ GWDG</p>
  </div>

<script src="popup.js"></script>
</body>
</html>
